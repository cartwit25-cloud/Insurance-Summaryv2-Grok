<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>保障建議書轉換</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.4.0/dist/tabler-icons.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<!-- Tesseract.js for OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@v5.1.0/dist/tesseract.min.js"></script>

<style>
/* 保留你原本所有樣式...（這裡省略以節省篇幅，你原本的 <style> 全部保留） */
* { box-sizing: border-box; margin: 0; padding: 0; }
/* ... 你原本的全部 CSS ... */

.upload-area {
  border: 2px dashed var(--accent);
  border-radius: 12px;
  padding: 2rem;
  text-align: center;
  background: var(--surface);
  cursor: pointer;
  margin-bottom: 1rem;
}
.upload-area:hover { background: #f0f7f4; }
</style>
</head>
<body>
<div class="container">
  <h1 class="page-title">保障建議書轉換</h1>
  <p class="page-sub">填入保障數字或上傳藍色報告圖片，自動生成保障卡片</p>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('form')"><i class="ti ti-edit"></i> 填寫資料</button>
    <button class="tab-btn" onclick="switchTab('result')"><i class="ti ti-layout-cards"></i> 保障卡片</button>
  </div>

  <!-- 新增：上傳區 -->
  <div class="section-card">
    <div class="section-header">
      <div class="section-title-row"><span class="section-icon">📸</span><span class="section-name">上傳藍色保障報告圖片</span></div>
    </div>
    <div class="upload-area" id="uploadArea">
      <i class="ti ti-upload" style="font-size:48px;color:var(--accent);margin-bottom:8px"></i>
      <p>點擊或拖曳藍色保障報告圖片上傳<br><small>支援截圖或照片，系統會自動辨識</small></p>
      <input type="file" id="imageUpload" accept="image/*" style="display:none">
    </div>
    <div id="preview" style="display:none;margin-top:10px;text-align:center"></div>
  </div>

  <!-- 你原本的 form-view 全部保留... -->
  <div class="form-view active" id="formView">
    <!-- ... 你原本所有 section-card ... -->
    <!-- （為了篇幅這裡省略，你直接把原本的 form-view 內容貼進來） -->
  </div>

  <!-- result-view 也保留 -->
  <div class="result-view" id="resultView">...</div>
</div>

<script>
// ============== 你原本的所有 JS 函數保留 ==============
// （switchTab, toggleSection, generate, exportPDF 等全部保留）

// ============== 新增：OCR + 解析 ==============
let currentImage = null;

document.getElementById('uploadArea').addEventListener('click', () => {
  document.getElementById('imageUpload').click();
});

document.getElementById('imageUpload').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(ev) {
    currentImage = ev.target.result;
    document.getElementById('preview').innerHTML = `<img src="${currentImage}" style="max-width:100%;max-height:400px;border-radius:8px">`;
    document.getElementById('preview').style.display = 'block';

    await recognizeImage(currentImage);
  };
  reader.readAsDataURL(file);
});

// 主要 OCR 函數
async function recognizeImage(imageData) {
  const loadingMsg = document.createElement('div');
  loadingMsg.style.cssText = 'margin:15px 0;color:var(--accent);font-weight:500';
  loadingMsg.textContent = '🔍 正在辨識文字...（可能需 15~40 秒）';
  document.getElementById('uploadArea').appendChild(loadingMsg);

  try {
    const worker = await Tesseract.createWorker('chi_tra', 1, {
      logger: m => console.log(m)
    });

    const { data: { text } } = await worker.recognize(imageData);
    await worker.terminate();

    console.log("OCR 原始文字：", text);
    parseInsuranceText(text);

  } catch (err) {
    alert('OCR 辨識失敗，請確認圖片清晰或手動填寫');
    console.error(err);
  } finally {
    loadingMsg.remove();
  }
}

// 核心解析函數（根據你提供的藍色圖片格式）
function parseInsuranceText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  // 客戶姓名
  const nameMatch = text.match(/客戶姓名\s*[:：]\s*([^\n]+)/);
  if (nameMatch) document.getElementById('clientName').value = nameMatch[1].trim();

  // 日期
  const dateMatch = text.match(/列印日期\s*[:：]\s*([\d/]+)/);
  if (dateMatch) document.getElementById('planDate').value = dateMatch[1].trim();

  // === 重大傷病 ===
  const critMatch = text.match(/重大傷病\s*([\d,]+)/);
  if (critMatch) document.getElementById('critical-amount').value = parseNumber(critMatch[1]) / 10000;

  const diseaseMatch = text.match(/重大疾病\s*([\d,]+)/);
  if (diseaseMatch) document.getElementById('disease-amount').value = parseNumber(diseaseMatch[1]) / 10000;

  // === 日額 / 手術（醫療）===
  const hospMatch = text.match(/住院日額.*?(\d+)/);
  if (hospMatch) document.getElementById('daily-hosp').value = parseNumber(hospMatch[1]) / 100;

  const nurseMatch = text.match(/住院看護.*?(\d+)/);
  if (nurseMatch) document.getElementById('daily-nurse').value = parseNumber(nurseMatch[1]) / 100;

  // === 實支實付 ===
  const roomMatch = text.match(/病房費.*?(\d+)/);
  if (roomMatch) document.getElementById('reimb-room').value = parseNumber(roomMatch[1]);

  const miscMatch = text.match(/雜費.*?(\d+)/);
  if (miscMatch) document.getElementById('reimb-misc').value = parseNumber(miscMatch[1]);

  // === 意外險 ===
  const deathMatch = text.match(/意外身故.*?([\d,]+)/);
  if (deathMatch) document.getElementById('acc-death').value = parseNumber(deathMatch[1]) / 10000;

  const accDailyMatch = text.match(/意外住院.*?(\d+)/);
  if (accDailyMatch) document.getElementById('acc-daily').value = parseNumber(accDailyMatch[1]) / 100;

  // === 癌症 ===
  const cancerHospMatch = text.match(/癌症住院.*?(\d+)/);
  if (cancerHospMatch) document.getElementById('cancer-hosp').value = parseNumber(cancerHospMatch[1]) / 100;

  const chemoMatch = text.match(/化療.*?(\d+)/);
  if (chemoMatch) document.getElementById('cancer-chemo').value = parseNumber(chemoMatch[1]) / 100;

  // 壽險
  const lifeMatch = text.match(/壽險保障.*?([\d,]+)/);
  if (lifeMatch) document.getElementById('life-amount').value = parseNumber(lifeMatch[1]) / 10000;

  alert('✅ 辨識完成！請檢查並修正表單內容後點擊「生成保障卡片」');
}

// 輔助函數
function parseNumber(str) {
  return parseFloat(str.replace(/[^0-9.]/g, '')) || 0;
}

// ============== Google Sheets GAS 匯出 ==============
function exportToGoogleSheets() {
  const data = {
    clientName: val('clientName'),
    planDate: val('planDate'),
    critical: w('critical-amount'),
    disease: w('disease-amount'),
    dailyHosp: h('daily-hosp'),
    // ... 你可以繼續加其他欄位
    timestamp: new Date().toISOString()
  };

  // 把下面這個網址換成你自己的 GAS Web App URL
  const GAS_URL = "https://script.google.com/macros/s/YOUR_GAS_ID/exec";

  fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(data),
    headers: { 'Content-Type': 'application/json' }
  })
  .then(r => r.text())
  .then(res => alert('✅ 已成功匯出到 Google Sheets！\n' + res))
  .catch(() => alert('❌ 匯出失敗，請確認 GAS URL'));
}

// 在 result-view 的 action-row 裡新增一個按鈕
// <button class="btn-sec" onclick="exportToGoogleSheets()">📊 匯出到 Google Sheets</button>
</script>
</body>
</html>
